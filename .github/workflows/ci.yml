name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: lint + typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.8.17"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy src tests

      - name: Pytest
        run: uv run pytest --cov=superbrain --cov-report=term-missing

  gaia:
    name: gaia doctor
    runs-on: ubuntu-latest
    steps:
      - name: Checkout superbrain
        uses: actions/checkout@v4

      - name: Checkout gaia (private)
        uses: actions/checkout@v4
        with:
          repository: frankpietro/gaia
          token: ${{ secrets.GAIA_READ_PAT }}
          path: .gaia-src
          ref: main

      - name: Install gaia CLI
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          ln -sf "$GITHUB_WORKSPACE/.gaia-src/gaia" "$HOME/.local/bin/gaia"
          chmod +x "$GITHUB_WORKSPACE/.gaia-src/gaia"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Gaia doctor
        run: gaia doctor --verbose
