# Fly.io config for the Superbrain API.
# Apps are deployed from the repo root with:
#   fly deploy --config deploy/api/fly.toml
# so the build context captures `pyproject.toml`, `uv.lock`, and `src/`.
#
# Free-tier sizing: 1 shared-cpu-1x machine, 256 MB, auto-stopping when idle.
# The same persistent volume (`superbrain_data`) is expected to be mounted by
# the Phase-5 scheduler worker so reads and writes hit the same Parquet lake.

app = "superbrain-api"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  SUPERBRAIN_LAKE_PATH = "/data/lake"
  SUPERBRAIN_LOG_LEVEL = "INFO"
  SUPERBRAIN_CORS_ORIGINS = "https://superbrain.vercel.app"

[[mounts]]
  source = "superbrain_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
